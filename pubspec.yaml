name: mobile1_app
description: "Professional Flutter App with Clean Architecture"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Navigation
  go_router: ^14.0.0

  # UI/UX
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # Local Storage
  shared_preferences: ^2.2.0

  # Utilities
  intl: ^0.19.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.7
  flutter_local_notifications: ^19.4.2
  device_info_plus: ^11.5.0

  # Payments
  flutter_stripe: ^11.1.0
  flutter_stripe_web: ^6.5.1

  # Export & Sharing
  pdf: ^3.11.1
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  flutter_tts: ^4.2.5
  record: ^6.1.1
  permission_handler: ^12.0.1
  fl_chart: ^1.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
